<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gulintangan Interactive</title>
<style>
:root{ --padImage:url('assets/gamelan.jpg'); }
body{ margin:0; font-family:sans-serif; background:#f6f7fb; }
#frame{
 display:grid;
 grid-template-columns: repeat(16, minmax(22px, 1fr));
 gap:10px;
 justify-items:center;
 padding:20px;
}

/* Bottom row (naturals) */
.n-C4 { grid-column: 1;  grid-row: 2; }
.n-D4 { grid-column: 3;  grid-row: 2; }
.n-E4 { grid-column: 5;  grid-row: 2; }
.n-F4 { grid-column: 7;  grid-row: 2; }
.n-G4 { grid-column: 9;  grid-row: 2; }
.n-A4 { grid-column:11;  grid-row: 2; }
.n-B4 { grid-column:13;  grid-row: 2; }
.n-C5 { grid-column:15;  grid-row: 2; }

/* Top row (sharps) */
.s-Cs4 { grid-column: 2; grid-row: 1; }
.s-Ds4 { grid-column: 4; grid-row: 1; }
.s-Fs4 { grid-column: 8; grid-row: 1; }
.s-Gs4 { grid-column:10; grid-row: 1; }
.s-As4 { grid-column:12; grid-row: 1; }

.pad{
 width:90px; height:90px;
 border-radius:50%;
 background:#ccc;
}
</style>
</head>
<body>

<div id="frame">
<button class="pad s-Cs4" data-note="C#4"></button>
<button class="pad s-Ds4" data-note="D#4"></button>
<button class="pad s-Fs4" data-note="F#4"></button>
<button class="pad s-Gs4" data-note="G#4"></button>
<button class="pad s-As4" data-note="A#4"></button>

<button class="pad n-C4" data-note="C4"></button>
<button class="pad n-D4" data-note="D4"></button>
<button class="pad n-E4" data-note="E4"></button>
<button class="pad n-F4" data-note="F4"></button>
<button class="pad n-G4" data-note="G4"></button>
<button class="pad n-A4" data-note="A4"></button>
<button class="pad n-B4" data-note="B4"></button>
<button class="pad n-C5" data-note="C5"></button>
</div>

<script src="main.js"></script>
</body>
</html>
