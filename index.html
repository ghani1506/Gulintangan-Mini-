<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Interactive Gulintangan - by Ghani Ahmad</title>
  <meta name="description" content="Two-row Gulintangan (Caklempong style)" />

  <style>
    :root{
      --ink:#0f172a;
      --muted:#64748b;
      --bg:#f6f7fb;
      --padImage:url('assets/gamelan.jpg');
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background:var(--bg);
      color:var(--ink);
      display:flex;
      flex-direction:column;
    }

    header{
      background:linear-gradient(90deg,#0369a1,#0ea5e9);
      color:#fff;
      padding:16px;
      text-align:center;
    }

    main{
      max-width:1100px;
      margin:18px auto;
      padding:0 14px;
      width:100%;
    }

    .status{
      color:var(--muted);
      margin:10px 0 14px;
      min-height:1.2em;
      text-align:center;
    }

    #frame{
      display:grid;
      grid-template-columns: repeat(16, minmax(22px, 1fr));
      gap:10px;
      justify-items:center;
      align-items:center;
      padding:10px 0 20px;
      user-select:none;
      touch-action:manipulation;
    }

    /* Bottom row */
    .n-C4 { grid-column: 1; }  .n-D4 { grid-column: 3; }
    .n-E4 { grid-column: 5; }  .n-F4 { grid-column: 7; }
    .n-G4 { grid-column: 9; }  .n-A4 { grid-column:11; }
    .n-B4 { grid-column:13; }  .n-C5 { grid-column:15; }

    /* Top row */
    .s-Cs4 { grid-column: 2; grid-row:1; }
    .s-Ds4 { grid-column: 4; grid-row:1; }
    .s-Fs4 { grid-column: 8; grid-row:1; }
    .s-Gs4 { grid-column:10; grid-row:1; }
    .s-As4 { grid-column:12; grid-row:1; }

    .pad{
      width:108px;
      height:108px;
      border-radius:50%;
      border:1px solid rgba(0,0,0,.18);
      background-image:var(--padImage);
      background-size:cover;
      background-position:center;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.35),
        0 8px 18px rgba(0,0,0,.12);
      transition: transform .05s ease, filter .08s ease;
      cursor:pointer;
    }

    .pad:active,
    .pad.active{
      transform:translateY(2px) scale(.97);
      filter:brightness(1.15) saturate(1.1);
    }

    footer{
      margin-top:auto;
      text-align:center;
      color:var(--muted);
      padding:20px 0 30px;
      font-size:14px;
    }

    @media (max-width:920px){
      .pad{ width:92px; height:92px; }
    }

    @media (max-width:680px){
      .pad{ width:74px; height:74px; }
    }
  </style>
</head>

<body>

  <header>
    <h1>Gulintangan Interaktif G-Haz Brunei</h1>
    <p style="margin:4px 0 0;font-size:14px;">Tap atau tekan keyboard untuk bermain</p>
  </header>

  <main>
    <div id="status" class="status">
      Boleh dipukul satu atau serentak (polyphonic)
    </div>

    <div id="frame" aria-label="Gulintangan pads">

      <!-- Top row -->
      <button class="pad s-Cs4" data-note="C#4" aria-label="C sharp"></button>
      <button class="pad s-Ds4" data-note="D#4" aria-label="D sharp"></button>
      <button class="pad s-Fs4" data-note="F#4" aria-label="F sharp"></button>
      <button class="pad s-Gs4" data-note="G#4" aria-label="G sharp"></button>
      <button class="pad s-As4" data-note="A#4" aria-label="A sharp"></button>

      <!-- Bottom row -->
      <button class="pad n-C4" data-note="C4" aria-label="C"></button>
      <button class="pad n-D4" data-note="D4" aria-label="D"></button>
      <button class="pad n-E4" data-note="E4" aria-label="E"></button>
      <button class="pad n-F4" data-note="F4" aria-label="F"></button>
      <button class="pad n-G4" data-note="G4" aria-label="G"></button>
      <button class="pad n-A4" data-note="A4" aria-label="A"></button>
      <button class="pad n-B4" data-note="B4" aria-label="B"></button>
      <button class="pad n-C5" data-note="C5" aria-label="High C"></button>

    </div>
  </main>

  <!-- JS -->
  <script type="module" src="./main.js"></script>

  <footer>
    <p>© 2025 • Built for learning purposes by Ghani Ahmad</p>
  </footer>

</body>
</html>
